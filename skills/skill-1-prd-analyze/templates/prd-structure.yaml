# PRD Structure Template
# Generated by prd2impl skill-1-prd-analyze
# This file is the structured output of PRD analysis

---
prd_source: "{path to original PRD}"
analysis_date: "{YYYY-MM-DD}"
analyst: "{who ran the analysis}"

# ── Modules ──────────────────────────────────────────────
modules:
  - id: MOD-01
    name: "{Module name}"
    description: "{What this module does}"
    prd_sections: ["§X.Y"]
    sub_modules:
      - id: MOD-01a
        name: "{Sub-module}"
        description: "{...}"

# ── User Stories ─────────────────────────────────────────
user_stories:
  - id: US-001
    module: MOD-01
    persona: "{Who}"
    action: "{Does what}"
    goal: "{To achieve what}"
    acceptance_criteria:
      - "AC-001: {Measurable condition}"
    prd_ref: "§X.Y.Z"
    priority: high  # high | medium | low

# ── Non-Functional Requirements ──────────────────────────
nfrs:
  - id: NFR-01
    category: performance  # performance | security | scalability | compliance | reliability | usability
    requirement: "{Description}"
    metric: "{What to measure}"
    target: "{Target value}"
    prd_ref: "§X.Y"

# ── Technical Constraints ────────────────────────────────
constraints:
  - id: CON-01
    type: technology  # technology | architecture | deployment | data | integration
    description: "{Constraint description}"
    rationale: "{Why this constraint exists}"
    prd_ref: "§X.Y"

# ── External Dependencies ────────────────────────────────
external_deps:
  - id: DEP-01
    name: "{Dependency name}"
    type: api  # api | service | library | data-source
    status: available  # available | pending | unknown
    owner: "{Who provides this}"
    prd_ref: "§X.Y"

# ── Module Dependency Graph ──────────────────────────────
module_dependencies:
  MOD-01: [MOD-02]  # MOD-01 depends on MOD-02
  MOD-03: [MOD-01, MOD-02]

# ── Complexity Assessment ────────────────────────────────
complexity:
  - module: MOD-01
    estimated_tasks: 8  # Rough task count
    risk_level: medium  # low | medium | high
    risk_factors:
      - "{Risk description}"
    suggested_type_split:
      green: 5
      yellow: 2
      red: 1

# ── Flagged Items (need clarification) ───────────────────
flags:
  - id: FLAG-01
    type: ambiguous  # ambiguous | missing | conflicting | out-of-scope
    description: "{What needs clarification}"
    prd_ref: "§X.Y"
    suggested_resolution: "{Suggested answer}"

# ── Summary ──────────────────────────────────────────────
summary:
  module_count: 0
  story_count: 0
  nfr_count: 0
  constraint_count: 0
  dependency_count: 0
  flag_count: 0
  estimated_total_tasks: "0-0"
