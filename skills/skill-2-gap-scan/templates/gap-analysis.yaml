# Gap Analysis Template
# Generated by prd2impl skill-2-gap-scan
# Compares PRD requirements against existing codebase

---
scan_date: "{YYYY-MM-DD}"
prd_source: "{path to prd-structure.yaml}"
codebase_root: "{project root}"

# ── Coverage Summary ─────────────────────────────────────
summary:
  total_stories: 0
  implemented: 0
  partial: 0
  missing: 0
  coverage_pct: 0

# ── Coverage by Module ───────────────────────────────────
by_module:
  - module: MOD-01
    stories_total: 0
    implemented: 0
    partial: 0
    missing: 0
    coverage_pct: 0

# ── Story-Level Coverage ─────────────────────────────────
story_coverage:
  - story_id: US-001
    module: MOD-01
    status: implemented  # implemented | partial | missing
    confidence: high     # high | medium | low
    evidence:
      - file: "{file path}"
        line: 0
        match: "{matching code snippet}"
    missing_criteria:
      - "AC-003: {What's missing}"

# ── Gaps ─────────────────────────────────────────────────
gaps:
  - id: GAP-001
    story_id: US-015
    module: MOD-03
    description: "{What's missing}"
    gap_type: missing  # missing | partial | outdated
    existing_code: []  # Files that partially implement this
    missing_parts:
      - "{Part 1}"
      - "{Part 2}"
    estimated_effort: medium  # small | medium | large
    depends_on_gaps: []  # Other gaps this depends on

# ── NFR Gaps ─────────────────────────────────────────────
nfr_gaps:
  - nfr_id: NFR-01
    status: verified  # verified | partial | missing | unknown
    evidence: "{How we verified}"
    note: "{Additional context}"

# ── Dependency Gaps ──────────────────────────────────────
dependency_gaps:
  - dep_id: DEP-01
    status: available  # available | missing | outdated
    note: "{What's needed}"
