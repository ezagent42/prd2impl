# Execution Plan Template
# Generated by prd2impl skill-4-plan-schedule
# Defines batches, milestones, and timeline

---
generated_date: "{YYYY-MM-DD}"
tasks_source: "{path to tasks.yaml}"

# ── Project Configuration ────────────────────────────────
# Copied from project.yaml at generation time
project:
  name: "{Project Name}"
  start_date: "{YYYY-MM-DD}"
  target_end: "{YYYY-MM-DD or null}"
  team:
    # Dynamic — populated from project.yaml
    - id: Dev1
      line: main
      branch: dev
      skills: [fullstack]
  parallel_capacity: 1

# ── Batches ──────────────────────────────────────────────
batches:
  - id: batch-0
    name: "{Batch name}"
    milestone: M0
    schedule:
      start: "Day 1 AM"
      duration: "3 hours"
    tasks:
      - id: T0S.1
        owner: Dev1
        mode: solo  # pair | solo | parallel
    pre_check: "{What must be true before starting}"
    gate: "{What must be true after completion}"

# ── Milestones ───────────────────────────────────────────
milestones:
  - id: M0
    name: "{Milestone name}"
    phase: P0
    batches: [batch-0]
    schedule:
      target: "Day 1 EOD"
    gate_checks:
      - "{Verification criterion 1}"
      - "{Verification criterion 2}"
    smoke_test:
      - scenario: "{Test scenario}"
        command: "{Command to run}"
        expected: "{Expected result}"

# ── Timeline Summary ─────────────────────────────────────
timeline:
  total_batches: 0
  total_milestones: 0
  estimated_days: 0
  critical_path_hours: 0
  buffer_pct: 20

# ── Red Task Pre-Scheduling ─────────────────────────────
red_preemptions:
  - task_id: "{Red task ID}"
    original_batch: "{batch-N}"
    preempted_to: "{batch-M}"
    reason: "{Why start early}"
